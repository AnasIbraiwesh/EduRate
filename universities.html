<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Universities — EduRate</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<a href="#main-content" class="skip-link">Skip to content</a>
<div id="navbar-placeholder"></div>

<main id="main-content">

  <!-- ── Page Header ──────────────────────────────────────── -->
  <div style="background:var(--primary);padding:36px 0 28px">
    <div class="container">
      <div class="er-breadcrumb">
        <a href="index.html">Home</a>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        Universities
      </div>
      <h1 class="heading-1" style="color:var(--white);margin-bottom:6px">All Universities</h1>
      <p style="color:rgba(255,255,255,0.65);font-size:14px;margin:0">Browse and compare universities across Jordan</p>
    </div>
  </div>

  <!-- ── Filters Bar ──────────────────────────────────────── -->
  <div style="background:var(--white);border-bottom:1px solid var(--gray-200);padding:16px 0;position:sticky;top:64px;z-index:100">
    <div class="container">
      <div class="row g-3 align-items-center">
        <div class="col-12 col-md-5">
          <div class="er-input-wrapper">
            <span class="input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </span>
            <input type="text" id="searchInput" class="er-input" placeholder="Search universities..."
                   aria-label="Search universities" autocomplete="off">
          </div>
        </div>
        <div class="col-6 col-md-3">
          <select id="cityFilter" class="er-select" aria-label="Filter by city">
            <option value="">All Cities</option>
            <option value="Amman">Amman</option>
            <option value="Irbid">Irbid</option>
            <option value="Zarqa">Zarqa</option>
            <option value="Madaba">Madaba</option>
          </select>
        </div>
        <div class="col-6 col-md-3">
          <select id="sortSelect" class="er-select" aria-label="Sort results">
            <option value="rating-desc">Highest Rated</option>
            <option value="rating-asc">Lowest Rated</option>
            <option value="reviews-desc">Most Reviews</option>
            <option value="name-asc">Name A–Z</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Results ──────────────────────────────────────────── -->
  <section class="content-section">
    <div class="container">
      <div class="sort-bar">
        <span class="results-count" id="resultsCount">Showing 6 universities</span>
      </div>
      <div class="row g-4" id="uniGrid" role="list" aria-live="polite" aria-label="University results"></div>
      <div id="emptyState" class="empty-state d-none">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <h4>No universities found</h4>
        <p>Try adjusting your search or filters</p>
      </div>
    </div>
  </section>

</main>

<div id="footer-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/data.js"></script>
<script src="js/main.js"></script>
<script src="js/universities.js"></script>
</body>
</html>
