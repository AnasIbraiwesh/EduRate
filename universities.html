<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="favicon.png">
  <title>Universities — EduRate</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link id="bs-rtl" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" disabled>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="navbar-placeholder"></div>

<!-- ── Page Hero ──────────────────────────────────────────────── -->
<header class="page-hero">
  <div class="container">
    <div class="row align-items-center">
      <div class="col-lg-7">
        <span class="hero-eyebrow" style="font-size:12px"><i class="bi bi-building me-1" aria-hidden="true"></i><span data-i18n="unis.eyebrow">All Institutions</span></span>
        <h1 class="mt-2 mb-2" data-i18n="unis.title">Universities in Jordan</h1>
        <p class="mb-0" data-i18n="unis.subtitle">Browse and compare universities rated by verified students</p>
      </div>
      <div class="col-lg-5 mt-3 mt-lg-0">
        <div class="input-group">
          <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-muted" aria-hidden="true"></i></span>
          <input type="search" id="uni-search" class="form-control border-start-0 ps-0"
            data-i18n-placeholder="unis.search_ph" placeholder="Search by name or city…"
            aria-label="Search universities" autocomplete="off">
        </div>
      </div>
    </div>
  </div>
</header>

<!-- ── Main Content ───────────────────────────────────────────── -->
<main class="container py-5">
  <div class="row g-4">
    <!-- Sidebar Filters -->
    <div class="col-lg-3">
      <aside class="filter-sidebar" aria-label="Filter universities">
        <div class="filter-title"><i class="bi bi-funnel" aria-hidden="true"></i> <span data-i18n="unis.filter_title">Filters</span></div>

        <div class="filter-group">
          <label for="city-filter" data-i18n="unis.city_label">City / Location</label>
          <select id="city-filter" class="form-select" aria-label="Filter by city">
            <option value="" data-i18n="unis.all_cities">All Cities</option>
            <option value="Amman" data-i18n="unis.city_amman">Amman</option>
            <option value="Irbid" data-i18n="unis.city_irbid">Irbid</option>
            <option value="Madaba" data-i18n="unis.city_madaba">Madaba</option>
            <option value="Salt" data-i18n="unis.city_salt">Salt</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="rating-min"><span data-i18n="unis.rating_label">Minimum Rating:</span> <strong id="rating-min-val">0.0</strong></label>
          <input type="range" id="rating-min" min="0" max="5" step="0.5" value="0"
            aria-label="Minimum rating filter">
        </div>

        <div class="filter-group">
          <label for="sort-by" data-i18n="unis.sort_label">Sort By</label>
          <select id="sort-by" class="form-select" aria-label="Sort universities">
            <option value="rating" data-i18n="unis.sort_rating">Highest Rated</option>
            <option value="reviews" data-i18n="unis.sort_reviews">Most Reviewed</option>
            <option value="alpha" data-i18n="unis.sort_alpha">Alphabetical</option>
          </select>
        </div>

        <button class="btn btn-outline-secondary btn-sm w-100 mt-2" id="reset-filters">
          <i class="bi bi-arrow-counterclockwise me-1" aria-hidden="true"></i> <span data-i18n="unis.reset">Reset Filters</span>
        </button>
      </aside>
    </div>

    <!-- Results -->
    <div class="col-lg-9">
      <div class="results-toolbar">
        <p class="results-count mb-0"><span data-i18n="unis.showing">Showing</span> <strong id="results-count">0</strong> <span data-i18n="unis.count_suffix">universities</span></p>
        <div class="d-flex gap-2 align-items-center">
          <span style="font-size:13px;color:var(--text-secondary)" data-i18n="unis.sort_inline">Sort:</span>
          <select id="sort-by-inline" class="form-select form-select-sm" style="width:160px" aria-label="Sort universities">
            <option value="rating" data-i18n="unis.sort_rating">Highest Rated</option>
            <option value="reviews" data-i18n="unis.sort_reviews">Most Reviewed</option>
            <option value="alpha" data-i18n="unis.sort_alpha">Alphabetical</option>
          </select>
        </div>
      </div>

      <!-- Skeleton loader -->
      <div id="skeleton-grid" class="row g-4">
        ${[1,2,3].map(() => `
          <div class="col-lg-4 col-md-6">
            <div class="card p-3">
              <div class="skeleton sk-card mb-3" style="height:80px;border-radius:var(--radius-lg)"></div>
              <div class="skeleton sk-title"></div>
              <div class="skeleton sk-line w-75"></div>
              <div class="skeleton sk-line w-50"></div>
            </div>
          </div>`).join('')}
      </div>

      <!-- Results grid -->
      <div id="uni-grid" class="row g-4" aria-live="polite" aria-label="University results"></div>

      <!-- Empty state -->
      <div id="empty-state" class="empty-state d-none" role="status">
        <div class="empty-state-icon" aria-hidden="true"><i class="bi bi-search"></i></div>
        <h3 data-i18n="unis.empty_title">No universities found</h3>
        <p data-i18n="unis.empty_desc">Try adjusting your search or filters to find what you're looking for.</p>
        <button class="btn btn-outline-primary" id="clear-search" data-i18n="unis.clear">Clear Search</button>
      </div>

      <!-- Pagination -->
      <div id="pagination-wrap" class="mt-4"></div>
    </div>
  </div>
</main>

<div id="footer-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/translations.js"></script>
<script src="js/i18n.js"></script>
<script src="js/api.js"></script>
<script src="js/data.js"></script>
<script src="js/main.js"></script>
<script>
const PER_PAGE = 6;
let currentPage = 1;
let filteredUnis = [];
let _allUnis = [];

function applyFilters() {
  const q       = document.getElementById('uni-search').value.trim().toLowerCase();
  const city    = document.getElementById('city-filter').value;
  const minRat  = parseFloat(document.getElementById('rating-min').value);
  const sortBy  = document.getElementById('sort-by-inline').value;

  filteredUnis = _allUnis.filter(u => {
    const matchQ    = !q || u.name.toLowerCase().includes(q) || (u.city || '').toLowerCase().includes(q);
    const matchCity = !city || u.city === city;
    const matchRat  = u.overallRating >= minRat;
    return matchQ && matchCity && matchRat;
  });

  if (sortBy === 'rating')  filteredUnis.sort((a,b) => b.overallRating - a.overallRating);
  if (sortBy === 'reviews') filteredUnis.sort((a,b) => b.totalReviews - a.totalReviews);
  if (sortBy === 'alpha')   filteredUnis.sort((a,b) => a.name.localeCompare(b.name));

  currentPage = 1;
  renderResults();
}

function renderResults() {
  const skeleton = document.getElementById('skeleton-grid');
  const grid     = document.getElementById('uni-grid');
  const empty    = document.getElementById('empty-state');
  skeleton.style.display = 'none';

  document.getElementById('results-count').textContent = filteredUnis.length;

  if (!filteredUnis.length) {
    grid.innerHTML = '';
    empty.classList.remove('d-none');
    document.getElementById('pagination-wrap').innerHTML = '';
    return;
  }
  empty.classList.add('d-none');

  const start = (currentPage - 1) * PER_PAGE;
  const page  = filteredUnis.slice(start, start + PER_PAGE);
  grid.innerHTML = page.map(uniCardHTML).join('');

  renderPagination('pagination-wrap', filteredUnis.length, PER_PAGE, currentPage, p => {
    currentPage = p;
    renderResults();
    grid.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });
}

document.addEventListener('DOMContentLoaded', () => {
  buildNavbar('universities');
  buildFooter();
  I18N.init();

  // Pre-fill search from URL param
  const q = new URLSearchParams(window.location.search).get('q');
  if (q) document.getElementById('uni-search').value = q;

  API.getUniversities().then(raw => {
    _allUnis = raw.map(normalizeUniversity);
    applyFilters();
  }).catch(() => applyFilters());

  // Event listeners
  ['uni-search','city-filter','rating-min','sort-by','sort-by-inline'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('input', applyFilters);
  });
  document.getElementById('sort-by').addEventListener('change', e => {
    document.getElementById('sort-by-inline').value = e.target.value;
    applyFilters();
  });
  document.getElementById('rating-min').addEventListener('input', function() {
    document.getElementById('rating-min-val').textContent = parseFloat(this.value).toFixed(1);
    applyFilters();
  });
  document.getElementById('reset-filters').addEventListener('click', () => {
    document.getElementById('uni-search').value = '';
    document.getElementById('city-filter').value = '';
    document.getElementById('rating-min').value = 1;
    document.getElementById('rating-min-val').textContent = '1.0';
    document.getElementById('sort-by-inline').value = 'rating';
    applyFilters();
  });
  document.getElementById('clear-search').addEventListener('click', () => {
    document.getElementById('reset-filters').click();
  });
});
</script>
</body>
</html>
