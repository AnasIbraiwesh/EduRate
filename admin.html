<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — EduRate</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link id="bs-rtl" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" disabled>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .dashboard-layout { display: flex; min-height: calc(100vh - 70px); }
    .dash-sidebar { width: 240px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); padding: 24px 0; }
    .dash-content { flex: 1; padding: 32px; overflow-x: hidden; }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }
    @media (max-width: 767px) {
      .dashboard-layout { flex-direction: column; }
      .dash-sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border); padding: 12px 0; }
      .dashboard-nav { display: flex; flex-wrap: wrap; }
      .dashboard-nav .nav-link { border-left: none !important; border-bottom: 3px solid transparent; }
      .dashboard-nav .nav-link.active { border-bottom-color: var(--primary); }
      .dash-content { padding: 20px 16px; }
    }
  </style>
</head>
<body>

<div id="navbar-placeholder"></div>

<div id="auth-gate" class="container py-5 d-none">
  <div class="empty-state" style="background:var(--surface);border-radius:var(--radius-xl);padding:64px 40px;box-shadow:var(--shadow-card)">
    <div style="font-size:64px;margin-bottom:16px">🔒</div>
    <h2>Admin Access Only</h2>
    <p style="max-width:400px;margin:0 auto 24px">You must be logged in as an Admin to view this page.</p>
    <a href="login.html" class="btn btn-primary btn-lg">Log In</a>
  </div>
</div>

<div class="dashboard-layout" id="dash-layout" style="display:none">
  <aside class="dash-sidebar">
    <div class="px-4 mb-4">
      <div style="font-size:32px">🛡️</div>
      <div style="font-weight:700;font-size:16px;margin-top:8px">Admin Panel</div>
    </div>
    <nav class="dashboard-nav">
      <a href="#" class="nav-link active" data-tab="universities"><i class="bi bi-building me-2"></i>Universities</a>
      <a href="#" class="nav-link" data-tab="professors"><i class="bi bi-person-badge me-2"></i>Professors</a>
    </nav>
  </aside>

  <main class="dash-content">

    <!-- Universities Tab -->
    <div id="tab-universities" class="tab-pane active">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">Universities</h2>
        <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#addUniModal">
          <i class="bi bi-plus-lg me-1"></i>Add University
        </button>
      </div>
      <div class="profile-card">
        <div class="profile-card-body p-0">
          <table class="table table-hover mb-0" id="uni-table">
            <thead><tr><th>Name</th><th>Location</th><th>Website</th><th></th></tr></thead>
            <tbody id="uni-tbody"><tr><td colspan="4" class="text-center py-4 text-muted">Loading...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Professors Tab -->
    <div id="tab-professors" class="tab-pane">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">Professors</h2>
        <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#addProfModal">
          <i class="bi bi-plus-lg me-1"></i>Add Professor
        </button>
      </div>
      <div class="profile-card">
        <div class="profile-card-body p-0">
          <table class="table table-hover mb-0">
            <thead><tr><th>Name</th><th>University</th><th>Department</th><th></th></tr></thead>
            <tbody id="prof-tbody"><tr><td colspan="4" class="text-center py-4 text-muted">Loading...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>

  </main>
</div>

<!-- Add University Modal -->
<div class="modal fade" id="addUniModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header" style="background:var(--primary);color:#fff">
        <h5 class="modal-title">Add University</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3"><label class="form-label">Name *</label><input type="text" class="form-control" id="uni-name" required></div>
        <div class="mb-3"><label class="form-label">Location *</label><input type="text" class="form-control" id="uni-location" required></div>
        <div class="mb-3"><label class="form-label">Description</label><textarea class="form-control" id="uni-desc" rows="3"></textarea></div>
        <div class="mb-3"><label class="form-label">Website URL</label><input type="url" class="form-control" id="uni-website"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" id="save-uni-btn">Save</button>
      </div>
    </div>
  </div>
</div>

<!-- Add Professor Modal -->
<div class="modal fade" id="addProfModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header" style="background:var(--primary);color:#fff">
        <h5 class="modal-title">Add Professor</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3"><label class="form-label">Full Name *</label><input type="text" class="form-control" id="prof-name" required></div>
        <div class="mb-3"><label class="form-label">University *</label><select class="form-select" id="prof-uni"></select></div>
        <div class="mb-3"><label class="form-label">Department *</label><input type="text" class="form-control" id="prof-dept" required></div>
        <div class="mb-3"><label class="form-label">Specialization</label><input type="text" class="form-control" id="prof-spec"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" id="save-prof-btn">Save</button>
      </div>
    </div>
  </div>
</div>

<div id="footer-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/translations.js"></script>
<script src="js/i18n.js"></script>
<script src="js/api.js"></script>
<script src="js/data.js"></script>
<script src="js/main.js"></script>
<script>
let unis = [], profs = [];

document.addEventListener('DOMContentLoaded', async () => {
  buildNavbar('');
  buildFooter();
  I18N.init();

  const user = AUTH.get();
  if (!user || user.role?.toLowerCase() !== 'admin') {
    document.getElementById('auth-gate').classList.remove('d-none');
    return;
  }
  document.getElementById('dash-layout').style.display = 'flex';

  // Tab navigation
  document.querySelectorAll('.dashboard-nav .nav-link').forEach(link => {
    link.addEventListener('click', e => {
      e.preventDefault();
      document.querySelectorAll('.dashboard-nav .nav-link').forEach(l => l.classList.remove('active'));
      link.classList.add('active');
      document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
      document.getElementById('tab-' + link.dataset.tab).classList.add('active');
    });
  });

  await loadData();

  // Save university
  document.getElementById('save-uni-btn').addEventListener('click', async () => {
    const name = document.getElementById('uni-name').value.trim();
    const location = document.getElementById('uni-location').value.trim();
    if (!name || !location) return showToast('Name and Location are required.', 'danger');
    try {
      await API.createUniversity({ name, location, description: document.getElementById('uni-desc').value.trim(), websiteUrl: document.getElementById('uni-website').value.trim() });
      bootstrap.Modal.getInstance(document.getElementById('addUniModal')).hide();
      document.getElementById('uni-name').value = ''; document.getElementById('uni-location').value = '';
      document.getElementById('uni-desc').value = ''; document.getElementById('uni-website').value = '';
      await loadData();
      showToast('University added.', 'success');
    } catch { showToast('Failed to add university.', 'danger'); }
  });

  // Save professor
  document.getElementById('save-prof-btn').addEventListener('click', async () => {
    const fullName = document.getElementById('prof-name').value.trim();
    const universityId = parseInt(document.getElementById('prof-uni').value);
    const department = document.getElementById('prof-dept').value.trim();
    if (!fullName || !universityId || !department) return showToast('Name, University and Department are required.', 'danger');
    try {
      await API.createProfessor({ fullName, universityId, department, specialization: document.getElementById('prof-spec').value.trim() });
      bootstrap.Modal.getInstance(document.getElementById('addProfModal')).hide();
      document.getElementById('prof-name').value = ''; document.getElementById('prof-dept').value = ''; document.getElementById('prof-spec').value = '';
      await loadData();
      showToast('Professor added.', 'success');
    } catch { showToast('Failed to add professor.', 'danger'); }
  });
});

async function loadData() {
  const [uniData, profData] = await Promise.all([API.getUniversities(), API.getProfessors()]);
  unis = uniData; profs = profData;
  renderUnis(); renderProfs(); populateUniDropdown();
}

function renderUnis() {
  document.getElementById('uni-tbody').innerHTML = unis.length
    ? unis.map(u => `<tr>
        <td>${u.name}</td>
        <td>${u.location}</td>
        <td>${u.websiteUrl ? `<a href="${u.websiteUrl}" target="_blank" rel="noopener">Link</a>` : '—'}</td>
        <td><button class="btn btn-danger btn-sm" onclick="deleteUni(${u.universityId})"><i class="bi bi-trash"></i></button></td>
      </tr>`).join('')
    : '<tr><td colspan="4" class="text-center py-4 text-muted">No universities yet.</td></tr>';
}

function renderProfs() {
  document.getElementById('prof-tbody').innerHTML = profs.length
    ? profs.map(p => `<tr>
        <td>${p.fullName}</td>
        <td>${unis.find(u => u.universityId === p.universityId)?.name || '—'}</td>
        <td>${p.department}</td>
        <td><button class="btn btn-danger btn-sm" onclick="deleteProf(${p.professorId})"><i class="bi bi-trash"></i></button></td>
      </tr>`).join('')
    : '<tr><td colspan="4" class="text-center py-4 text-muted">No professors yet.</td></tr>';
}

function populateUniDropdown() {
  document.getElementById('prof-uni').innerHTML =
    '<option value="">Select university...</option>' +
    unis.map(u => `<option value="${u.universityId}">${u.name}</option>`).join('');
}

async function deleteUni(id) {
  if (!confirm('Delete this university?')) return;
  try { await API.deleteUniversity(id); await loadData(); showToast('University deleted.', 'success'); }
  catch { showToast('Failed to delete.', 'danger'); }
}

async function deleteProf(id) {
  if (!confirm('Delete this professor?')) return;
  try { await API.deleteProfessor(id); await loadData(); showToast('Professor deleted.', 'success'); }
  catch { showToast('Failed to delete.', 'danger'); }
}
</script>
</body>
</html>
