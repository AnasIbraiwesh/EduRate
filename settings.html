<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="favicon.png">
  <title>Settings — EduRate</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link id="bs-rtl" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" disabled>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="navbar-placeholder"></div>

<header class="page-hero">
  <div class="container text-center">
    <h1><i class="bi bi-gear me-2" aria-hidden="true"></i><span data-i18n="settings.title">Settings</span></h1>
  </div>
</header>

<main class="container py-5" style="max-width:600px">

  <div class="card shadow-sm">
    <div class="card-body p-4">
      <h2 class="h5 mb-4"><i class="bi bi-building me-2"></i><span data-i18n="settings.uni_section">Your University</span></h2>

      <div class="mb-3">
        <label class="form-label fw-semibold" data-i18n="settings.uni_current">Current university</label>
        <p id="current-uni-name" class="text-muted mb-0">—</p>
        <small id="last-changed-text" class="text-muted d-none"></small>
      </div>

      <div class="mb-3">
        <label for="uni-select" class="form-label" data-i18n="settings.uni_label">Selected University</label>
        <select id="uni-select" class="form-select">
          <option value="" disabled selected data-i18n="signup.uni_default">Select your university…</option>
        </select>
      </div>

      <div id="settings-alert" class="alert d-none" role="alert"></div>

      <button id="save-btn" class="btn btn-primary w-100">
        <span id="save-text" data-i18n="settings.uni_save">Save University</span>
        <span id="save-spinner" class="spinner-border spinner-border-sm ms-2 d-none" aria-label="Saving"></span>
      </button>
    </div>
  </div>

</main>

<div id="footer-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/data.js"></script>
<script src="js/translations.js"></script>
<script src="js/i18n.js"></script>
<script src="js/main.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  buildNavbar('settings');
  buildFooter();
  I18N.init();

  const user = AUTH.get();
  if (!user) { window.location.href = 'login.html'; return; }

  // Populate university dropdown
  API.getUniversities().then(unis => {
    const sel = document.getElementById('uni-select');
    unis.forEach(u => {
      const opt = document.createElement('option');
      opt.value = u.universityId;
      opt.textContent = u.name;
      if (Number(u.universityId) === Number(user.universityId)) {
        opt.selected = true;
        document.getElementById('current-uni-name').textContent = u.name;
      }
      sel.appendChild(opt);
    });
    if (!user.universityId) {
      document.getElementById('current-uni-name').textContent = t('settings.uni_none');
    }
  }).catch(() => {});

  // Show last changed date if available
  if (user.universityChangedAt) {
    const el = document.getElementById('last-changed-text');
    el.textContent = `${t('settings.last_changed')}: ${new Date(user.universityChangedAt).toLocaleDateString()}`;
    el.classList.remove('d-none');
  }

  document.getElementById('save-btn').addEventListener('click', async () => {
    const uniId = parseInt(document.getElementById('uni-select').value);
    if (!uniId) return;

    const btn = document.getElementById('save-btn');
    const alertEl = document.getElementById('settings-alert');
    btn.disabled = true;
    document.getElementById('save-spinner').classList.remove('d-none');
    alertEl.className = 'alert d-none';

    try {
      const res = await API.updateUniversity(uniId);
      AUTH.set({ ...AUTH.get(), universityId: res.universityId, universityChangedAt: res.universityChangedAt });
      alertEl.className = 'alert alert-success';
      alertEl.textContent = t('settings.uni_updated');

      // Update displayed university name
      const sel = document.getElementById('uni-select');
      const selectedName = sel.options[sel.selectedIndex].textContent;
      document.getElementById('current-uni-name').textContent = selectedName;

      // Update last changed
      if (res.universityChangedAt) {
        const el = document.getElementById('last-changed-text');
        el.textContent = `${t('settings.last_changed')}: ${new Date(res.universityChangedAt).toLocaleDateString()}`;
        el.classList.remove('d-none');
      }
    } catch (err) {
      alertEl.className = 'alert alert-danger';
      alertEl.textContent = err.status === 409
        ? t('settings.uni_throttle')
        : t('review.err_failed');
    } finally {
      btn.disabled = false;
      document.getElementById('save-spinner').classList.add('d-none');
    }
  });
});
</script>
</body>
</html>
