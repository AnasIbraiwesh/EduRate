<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compare Professors — EduRate</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link id="bs-rtl" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" disabled>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="navbar-placeholder"></div>

<header class="page-hero" style="background:linear-gradient(135deg,#1a5276,var(--success))">
  <div class="container">
    <h1><i class="bi bi-layout-split me-2" aria-hidden="true"></i>Compare Professors</h1>
    <p class="mb-0">Select two professors to compare them side-by-side</p>
  </div>
</header>

<main class="container py-5">
  <!-- ── Selector ────────────────────────────────────────── -->
  <div class="compare-selector">
    <div class="row align-items-end g-3">
      <div class="col-md-5">
        <label for="prof1-select" class="form-label fw-600">Professor A</label>
        <select id="prof1-select" class="form-select" aria-label="Select first professor">
          <option value="" selected disabled>Choose a professor…</option>
        </select>
        <div class="form-text">Optional: filter by course for focused comparison</div>
      </div>
      <div class="col-md-2 d-flex justify-content-center">
        <div class="compare-vs" aria-hidden="true">VS</div>
      </div>
      <div class="col-md-5">
        <label for="prof2-select" class="form-label fw-600">Professor B</label>
        <select id="prof2-select" class="form-select" aria-label="Select second professor">
          <option value="" selected disabled>Choose a professor…</option>
        </select>
      </div>
    </div>
    <div class="text-center mt-4">
      <button class="btn btn-secondary btn-lg" id="compare-btn">
        <i class="bi bi-bar-chart me-2" aria-hidden="true"></i>Compare Now
      </button>
    </div>
  </div>

  <!-- ── Results ─────────────────────────────────────────── -->
  <div id="compare-results" class="d-none" aria-live="polite">
    <div class="row g-0 mb-0" id="compare-headers"></div>

    <div class="profile-card" style="border-radius:0 0 var(--radius-xl) var(--radius-xl)">
      <div id="compare-rows"></div>
      <div id="overall-winner" class="p-4 text-center" style="background:#f0fff4;border-top:2px solid var(--success)"></div>
    </div>

    <!-- Bar Chart -->
    <div class="profile-card mt-4">
      <div class="profile-card-header">
        <h2><i class="bi bi-bar-chart-fill me-2" style="color:var(--success)" aria-hidden="true"></i>Side-by-Side Chart</h2>
      </div>
      <div class="profile-card-body">
        <canvas id="compare-chart" style="max-height:350px" aria-label="Bar chart comparing two professors" role="img"></canvas>
        <div class="row mt-4 g-3">
          <div class="col-md-6 text-center">
            <h6 id="chart-p1-title" class="text-muted mb-2"></h6>
            <canvas id="chart-p1" role="img"></canvas>
          </div>
          <div class="col-md-6 text-center">
            <h6 id="chart-p2-title" class="text-muted mb-2"></h6>
            <canvas id="chart-p2" role="img"></canvas>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="compare-placeholder" class="empty-state mt-4">
    <div class="empty-state-icon" aria-hidden="true"><i class="bi bi-mortarboard"></i></div>
    <h3>Select Two Professors</h3>
    <p>Choose two professors from the dropdowns above for a detailed comparison.</p>
  </div>
</main>

<div id="footer-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<script src="js/api.js"></script>
<script src="js/data.js"></script>
<script src="js/translations.js"></script>
<script src="js/i18n.js"></script>
<script src="js/main.js"></script>
<script>
let compareChart = null, chartP1 = null, chartP2 = null;

function createBarChart(canvasId, label, data, color) {
  const ctx = document.getElementById(canvasId).getContext('2d');
  return new Chart(ctx, {
    type: 'bar',
    data: {
      labels: PROF_METRICS.map(m => m.label),
      datasets: [{ label, data, backgroundColor: color, borderRadius: 6, borderSkipped: false }]
    },
    options: {
      responsive: true,
      plugins: { legend: { position: 'top' } },
      scales: { y: { beginAtZero: true }, x: { ticks: { font: { size: 11 } } } }
    }
  });
}

// All metrics to compare
const PROF_METRICS = [
  { key: 'overallRating',  label: 'Overall Rating',     max: 5 },
  { key: 'diff',           label: 'Difficulty',         max: 5 },
  { key: 'workload',       label: 'Workload',            max: 5 },
  { key: 'friendliness',   label: 'Friendliness',       max: 5 },
  { key: 'wouldTakeAgain', label: 'Would Take Again (%)', max: 100 }
];

function getMetricVal(p, key) {
  if (key === 'diff') return p.ratings.difficulty;
  if (key === 'workload') return p.ratings.workload;
  if (key === 'friendliness') return p.ratings.friendliness;
  if (key === 'wouldTakeAgain') return p.wouldTakeAgain;
  return p.overallRating;
}

function renderComparison(p1, p2) {
  document.getElementById('compare-placeholder').classList.add('d-none');
  document.getElementById('compare-results').classList.remove('d-none');

  document.getElementById('compare-headers').innerHTML = `
    <div class="col-5">
      <div class="compare-col-header">
        <h3>${p1.name}</h3>
        <p>${p1.department} · ${p1.universityName}</p>
        <div class="rating-display justify-content-center">
          ${starsHTML(p1.overallRating)}
          <span style="color:#fff;font-weight:700">${p1.overallRating}</span>
        </div>
      </div>
    </div>
    <div class="col-2 d-flex align-items-stretch">
      <div class="compare-cell-label d-flex align-items-center justify-content-center" style="width:100%;border-radius:0;background:linear-gradient(135deg,#1a5276,var(--success));color:#fff;font-size:13px;font-weight:700">
        METRIC
      </div>
    </div>
    <div class="col-5">
      <div class="compare-col-header" style="background:linear-gradient(135deg,var(--primary),var(--secondary))">
        <h3>${p2.name}</h3>
        <p>${p2.department} · ${p2.universityName}</p>
        <div class="rating-display justify-content-center">
          ${starsHTML(p2.overallRating)}
          <span style="color:#fff;font-weight:700">${p2.overallRating}</span>
        </div>
      </div>
    </div>`;

  let p1Wins = 0, p2Wins = 0;
  const rows = PROF_METRICS.map(m => {
    const v1 = getMetricVal(p1, m.key);
    const v2 = getMetricVal(p2, m.key);
    const pct1 = (v1 / m.max) * 100;
    const pct2 = (v2 / m.max) * 100;
    const w1 = v1 > v2, w2 = v2 > v1;
    // For difficulty/workload, lower is "better"
    const lowIsBetter = m.key === 'diff' || m.key === 'workload';
    const realW1 = lowIsBetter ? v1 < v2 : w1;
    const realW2 = lowIsBetter ? v2 < v1 : w2;
    if (realW1) p1Wins++;
    if (realW2) p2Wins++;
    const displayV1 = m.key === 'wouldTakeAgain' ? `${v1}%` : v1.toFixed(1);
    const displayV2 = m.key === 'wouldTakeAgain' ? `${v2}%` : v2.toFixed(1);
    return `
      <div class="compare-row">
        <div class="compare-cell${realW1 ? ' winner' : ''}" style="flex:1">
          <div style="width:100%">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
              <strong>${displayV1}</strong>
              ${realW1 ? '<span class="winner-badge">Winner</span>' : ''}
            </div>
            <div class="rating-bar-track" style="height:8px">
              <div class="rating-bar-fill ${ratingColorClass(v1 * (m.max === 100 ? 0.05 : 1))}" style="width:${pct1}%"></div>
            </div>
          </div>
        </div>
        <div class="compare-cell-label">${m.label}${lowIsBetter ? '<br><small style="color:#999;font-size:10px">lower=better</small>' : ''}</div>
        <div class="compare-cell${realW2 ? ' winner' : ''}" style="flex:1">
          <div style="width:100%">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
              <strong>${displayV2}</strong>
              ${realW2 ? '<span class="winner-badge">Winner</span>' : ''}
            </div>
            <div class="rating-bar-track" style="height:8px">
              <div class="rating-bar-fill ${ratingColorClass(v2 * (m.max === 100 ? 0.05 : 1))}" style="width:${pct2}%"></div>
            </div>
          </div>
        </div>
      </div>`;
  }).join('');
  document.getElementById('compare-rows').innerHTML = rows;

  const winner = p1Wins > p2Wins ? p1 : p2Wins > p1Wins ? p2 : null;
  document.getElementById('overall-winner').innerHTML = winner
    ? `<div style="font-size:32px;margin-bottom:8px" aria-hidden="true">🏆</div>
       <h3 style="color:var(--success);margin-bottom:4px">Overall: ${winner.name}</h3>
       <p style="color:var(--text-secondary);margin:0">Won ${winner === p1 ? p1Wins : p2Wins} out of ${PROF_METRICS.length} metrics</p>`
    : `<h3 style="color:var(--text-secondary)">It's a Tie!</h3>`;

  // Bar chart
  if (compareChart) compareChart.destroy();
  const ctx = document.getElementById('compare-chart').getContext('2d');
  compareChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: PROF_METRICS.map(m => m.label),
      datasets: [
        { label: p1.name.split(' ').slice(-1)[0], data: PROF_METRICS.map(m => getMetricVal(p1, m.key)), backgroundColor: 'rgba(27,79,114,.8)', borderRadius: 6, borderSkipped: false },
        { label: p2.name.split(' ').slice(-1)[0], data: PROF_METRICS.map(m => getMetricVal(p2, m.key)), backgroundColor: 'rgba(39,174,96,.8)', borderRadius: 6, borderSkipped: false }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: true,
      plugins: { legend: { position: 'top' } },
      scales: {
        y: { beginAtZero: true },
        x: { ticks: { font: { size: 11 } } }
      }
    }
  });
  if (chartP1) chartP1.destroy();
  if (chartP2) chartP2.destroy();
  document.getElementById('chart-p1-title').textContent = p1.name.split(' ').slice(-1)[0];
  document.getElementById('chart-p2-title').textContent = p2.name.split(' ').slice(-1)[0];
  chartP1 = createBarChart('chart-p1', p1.name.split(' ').slice(-1)[0], PROF_METRICS.map(m => getMetricVal(p1, m.key)), 'rgba(27,79,114,.8)');
  chartP2 = createBarChart('chart-p2', p2.name.split(' ').slice(-1)[0], PROF_METRICS.map(m => getMetricVal(p2, m.key)), 'rgba(39,174,96,.8)');
}

document.addEventListener('DOMContentLoaded', () => {
  buildNavbar('compare');
  buildFooter();
  I18N.init();

  API.getProfessors().then(profs => {
    const sorted = profs.map(normalizeProfessor).sort((a,b) => a.name.localeCompare(b.name));
    ['prof1-select','prof2-select'].forEach(id => {
      const el = document.getElementById(id);
      sorted.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.id;
        opt.textContent = `${p.name} (${p.department} · ${p.universityName})`;
        el.appendChild(opt);
      });
    });
  }).catch(() => {});

  const id1 = getParam('id1'), id2 = getParam('id2');
  if (id1) document.getElementById('prof1-select').value = id1;
  if (id2) document.getElementById('prof2-select').value = id2;
  if (id1 && id2) {
    Promise.all([API.getProfessor(id1), API.getProfessor(id2)])
      .then(([p1Raw, p2Raw]) => renderComparison(normalizeProfessor(p1Raw), normalizeProfessor(p2Raw)))
      .catch(() => {});
  }

  document.getElementById('compare-btn').addEventListener('click', () => {
    const id1 = document.getElementById('prof1-select').value;
    const id2 = document.getElementById('prof2-select').value;
    if (!id1 || !id2) { showToast('Please select both professors.', 'error'); return; }
    if (id1 === id2) { showToast('Please select two different professors.', 'error'); return; }
    Promise.all([API.getProfessor(id1), API.getProfessor(id2)])
      .then(([p1Raw, p2Raw]) => {
        renderComparison(normalizeProfessor(p1Raw), normalizeProfessor(p2Raw));
        history.replaceState(null, '', `?id1=${id1}&id2=${id2}`);
      })
      .catch(() => showToast('Failed to load professor data.', 'error'));
  });
});
</script>
</body>
</html>
