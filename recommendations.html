<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recommendations — EduRate</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link id="bs-rtl" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" disabled>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="navbar-placeholder"></div>

<header class="page-hero">
  <div class="container">
    <span class="hero-eyebrow"><i class="bi bi-stars me-1"></i><span data-i18n="recs.eyebrow">Personalized For You</span></span>
    <h1 class="mt-2 mb-2" data-i18n="recs.hero_title">Find the University That Fits You Like a Glove</h1>
    <p class="mb-0" data-i18n="recs.hero_subtitle">Not every university is for everyone — answer 3 quick questions and we'll match you with the best fit.</p>
  </div>
</header>

<div class="container py-5" style="max-width:750px">
  <h2 class="fw-bold mb-1" data-i18n="recs.form_h2">Find Your University</h2>
  <p class="text-muted mb-4" data-i18n="recs.form_desc">Enter your details and we'll recommend the best match for you.</p>

  <div class="card shadow-sm p-4 mb-5">
    <div class="row g-3">
      <div class="col-md-4">
        <label class="form-label fw-semibold" data-i18n="recs.city_label">City</label>
        <select id="rec-city" class="form-select">
          <option value="" data-i18n="recs.city_any">Any City</option>
          <option>Amman</option>
          <option>Irbid</option>
          <option>Madaba</option>
          <option>Salt</option>
        </select>
      </div>
      <div class="col-md-4">
        <label class="form-label fw-semibold" data-i18n="recs.major_label">Major</label>
        <select id="rec-major" class="form-select">
          <option value="" data-i18n="recs.major_any">Any Major</option>
          <option value="Engineering" data-i18n="signup.major_engineering">Engineering</option>
          <option value="Technology & IT" data-i18n="signup.major_tech">Technology & IT</option>
          <option value="Medicine" data-i18n="signup.major_medicine">Medicine</option>
          <option value="Business" data-i18n="signup.major_business">Business</option>
          <option value="Arts & Humanities" data-i18n="signup.major_arts">Arts & Humanities</option>
        </select>
      </div>
      <div class="col-md-4">
        <label class="form-label fw-semibold" data-i18n="recs.grade_label">Your Grade (%)</label>
        <input type="number" id="rec-grade" class="form-control" data-i18n-placeholder="recs.grade_ph" placeholder="e.g. 85" min="0" max="100">
      </div>
      <div class="col-12">
        <button class="btn btn-primary w-100" onclick="recommend()">
          <i class="bi bi-search me-2"></i><span data-i18n="recs.find_btn">Find Universities</span>
        </button>
      </div>
    </div>
  </div>

  <div id="rec-results" class="row g-4"></div>
</div>

<div id="footer-placeholder"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/data.js"></script>
<script src="js/translations.js"></script>
<script src="js/i18n.js"></script>
<script src="js/main.js"></script>
<script>
const MAJOR_MAP = {
  'Engineering':       [2, 4],
  'Technology & IT':   [3, 5],
  'Medicine':          [2],
  'Business':          [1, 4],
  'Arts & Humanities': [1, 5]
};

function recommend() {
  const city  = document.getElementById('rec-city').value;
  const major = document.getElementById('rec-major').value;
  const grade = parseFloat(document.getElementById('rec-grade').value) || 0;

  let results = [...UNIVERSITIES];

  if (city)  results = results.filter(u => u.city === city);
  if (major) results = results.filter(u => MAJOR_MAP[major]?.includes(u.id));
  if (grade) results = results.filter(u => u.overallRating >= grade / 25);

  results.sort((a, b) => b.overallRating - a.overallRating);

  const container = document.getElementById('rec-results');
  container.innerHTML = results.length
    ? results.map(uniCardHTML).join('')
    : `<p class="text-muted" data-i18n="recs.no_match">${t('recs.no_match')}</p>`;
}

document.addEventListener('DOMContentLoaded', () => { buildNavbar('recommendations'); buildFooter(); I18N.init(); });
</script>
</body>
</html>
