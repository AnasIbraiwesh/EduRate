<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Professors — EduRate</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link id="bs-rtl" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" disabled>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="navbar-placeholder"></div>

<!-- ── Page Hero ──────────────────────────────────────────────── -->
<header class="page-hero">
  <div class="container">
    <div class="row align-items-center">
      <div class="col-lg-7">
        <span class="hero-eyebrow" style="font-size:12px"><i class="bi bi-mortarboard me-1" aria-hidden="true"></i><span data-i18n="profs.eyebrow">All Educators</span></span>
        <h1 class="mt-2 mb-2" data-i18n="profs.title">Professors in Jordan</h1>
        <p class="mb-0" data-i18n="profs.subtitle">Find and compare professors rated by verified students</p>
      </div>
      <div class="col-lg-5 mt-3 mt-lg-0">
        <div class="input-group">
          <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-muted" aria-hidden="true"></i></span>
          <input type="search" id="prof-search" class="form-control border-start-0 ps-0"
            data-i18n-placeholder="profs.search_ph" placeholder="Search by name or department…"
            aria-label="Search professors" autocomplete="off">
        </div>
      </div>
    </div>
  </div>
</header>

<!-- ── Main Content ───────────────────────────────────────────── -->
<main class="container py-5">
  <div class="row g-4">
    <!-- Sidebar Filters -->
    <div class="col-lg-3">
      <aside class="filter-sidebar" aria-label="Filter professors">
        <div class="filter-title"><i class="bi bi-funnel" aria-hidden="true"></i> <span data-i18n="unis.filter_title">Filters</span></div>

        <div class="filter-group">
          <label for="dept-filter" data-i18n="profs.dept_label">Department</label>
          <select id="dept-filter" class="form-select" aria-label="Filter by department">
            <option value="" data-i18n="profs.all_depts">All Departments</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="uni-filter" data-i18n="profs.uni_label">University</label>
          <select id="uni-filter" class="form-select" aria-label="Filter by university">
            <option value="" data-i18n="profs.all_unis">All Universities</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="rating-min"><span data-i18n="profs.rating_label">Minimum Rating:</span> <strong id="rating-min-val">1.0</strong></label>
          <input type="range" id="rating-min" min="1" max="5" step="0.5" value="1"
            aria-label="Minimum rating filter">
        </div>

        <div class="filter-group">
          <label for="wta-filter" data-i18n="profs.wta_label">Min. Would Take Again</label>
          <select id="wta-filter" class="form-select" aria-label="Filter by would take again">
            <option value="0" data-i18n="profs.wta_any">Any</option>
            <option value="50">50%+</option>
            <option value="70">70%+</option>
            <option value="80">80%+</option>
            <option value="90">90%+</option>
          </select>
        </div>

        <div class="filter-group">
          <label>
            <input type="checkbox" id="verified-only" class="form-check-input me-1">
            <span data-i18n="profs.verified_only">Verified professors only</span>
          </label>
        </div>

        <button class="btn btn-outline-secondary btn-sm w-100 mt-2" id="reset-filters">
          <i class="bi bi-arrow-counterclockwise me-1" aria-hidden="true"></i> <span data-i18n="profs.reset">Reset Filters</span>
        </button>
      </aside>
    </div>

    <!-- Results -->
    <div class="col-lg-9">
      <div class="results-toolbar">
        <p class="results-count mb-0"><span data-i18n="profs.showing">Showing</span> <strong id="results-count">0</strong> <span data-i18n="profs.count_suffix">professors</span></p>
        <div class="d-flex gap-2 align-items-center">
          <span style="font-size:13px;color:var(--text-secondary)" data-i18n="unis.sort_inline">Sort:</span>
          <select id="sort-by" class="form-select form-select-sm" style="width:180px" aria-label="Sort professors">
            <option value="rating" data-i18n="profs.sort_rating">Highest Rated</option>
            <option value="reviews" data-i18n="profs.sort_reviews">Most Reviewed</option>
            <option value="wta" data-i18n="profs.sort_wta">Would Take Again</option>
            <option value="alpha" data-i18n="profs.sort_alpha">Alphabetical</option>
          </select>
        </div>
      </div>

      <!-- Skeleton loader -->
      <div id="skeleton-grid" class="row g-4">
        ${[1,2,3].map(() => `
          <div class="col-lg-4 col-md-6">
            <div class="card p-3">
              <div class="skeleton" style="height:80px;border-radius:var(--radius-lg);margin-bottom:12px"></div>
              <div class="skeleton sk-title"></div>
              <div class="skeleton sk-line w-75"></div>
              <div class="skeleton sk-line w-50"></div>
            </div>
          </div>`).join('')}
      </div>

      <!-- Results grid -->
      <div id="prof-grid" class="row g-4" aria-live="polite" aria-label="Professor results"></div>

      <!-- Empty state -->
      <div id="empty-state" class="empty-state d-none" role="status">
        <div class="empty-state-icon" aria-hidden="true"><i class="bi bi-search"></i></div>
        <h3>No professors found</h3>
        <p>Try adjusting your search or filters.</p>
        <button class="btn btn-outline-primary" id="clear-search">Clear Filters</button>
      </div>

      <!-- Pagination -->
      <div id="pagination-wrap" class="mt-4"></div>
    </div>
  </div>
</main>

<div id="footer-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/translations.js"></script>
<script src="js/i18n.js"></script>
<script src="js/data.js"></script>
<script src="js/main.js"></script>
<script>
const PER_PAGE = 6;
let currentPage = 1;
let filteredProfs = [];

function applyFilters() {
  const q       = document.getElementById('prof-search').value.trim().toLowerCase();
  const dept    = document.getElementById('dept-filter').value;
  const uniId   = document.getElementById('uni-filter').value;
  const minRat  = parseFloat(document.getElementById('rating-min').value);
  const minWta  = parseInt(document.getElementById('wta-filter').value);
  const sortBy  = document.getElementById('sort-by').value;
  const verifiedOnly = document.getElementById('verified-only').checked;

  filteredProfs = PROFESSORS.filter(p => {
    const matchQ   = !q || p.name.toLowerCase().includes(q) || p.department.toLowerCase().includes(q) || p.universityName.toLowerCase().includes(q);
    const matchDept = !dept || p.department === dept;
    const matchUni  = !uniId || p.university === parseInt(uniId);
    const matchRat  = p.overallRating >= minRat;
    const matchWta  = p.wouldTakeAgain >= minWta;
    const matchVer  = !verifiedOnly || p.isVerified;
    return matchQ && matchDept && matchUni && matchRat && matchWta && matchVer;
  });

  if (sortBy === 'rating')  filteredProfs.sort((a,b) => b.overallRating - a.overallRating);
  if (sortBy === 'reviews') filteredProfs.sort((a,b) => b.totalReviews - a.totalReviews);
  if (sortBy === 'wta')     filteredProfs.sort((a,b) => b.wouldTakeAgain - a.wouldTakeAgain);
  if (sortBy === 'alpha')   filteredProfs.sort((a,b) => a.name.localeCompare(b.name));

  currentPage = 1;
  renderResults();
}

function renderResults() {
  const skeleton = document.getElementById('skeleton-grid');
  const grid     = document.getElementById('prof-grid');
  const empty    = document.getElementById('empty-state');
  skeleton.style.display = 'none';

  document.getElementById('results-count').textContent = filteredProfs.length;

  if (!filteredProfs.length) {
    grid.innerHTML = '';
    empty.classList.remove('d-none');
    document.getElementById('pagination-wrap').innerHTML = '';
    return;
  }
  empty.classList.add('d-none');

  const start = (currentPage - 1) * PER_PAGE;
  const page  = filteredProfs.slice(start, start + PER_PAGE);
  grid.innerHTML = page.map(profCardHTML).join('');

  renderPagination('pagination-wrap', filteredProfs.length, PER_PAGE, currentPage, p => {
    currentPage = p;
    renderResults();
    grid.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });
}

document.addEventListener('DOMContentLoaded', () => {
  buildNavbar('professors');
  buildFooter();
  I18N.init();

  // Populate dept dropdown
  const deptSelect = document.getElementById('dept-filter');
  getUniqueUniversityDepts().forEach(d => {
    const opt = document.createElement('option');
    opt.value = d; opt.textContent = d;
    deptSelect.appendChild(opt);
  });

  // Populate university dropdown
  const uniSelect = document.getElementById('uni-filter');
  UNIVERSITIES.forEach(u => {
    const opt = document.createElement('option');
    opt.value = u.id; opt.textContent = u.name;
    uniSelect.appendChild(opt);
  });

  // Pre-fill from URL
  const q = new URLSearchParams(window.location.search).get('q');
  if (q) document.getElementById('prof-search').value = q;

  setTimeout(applyFilters, 400);

  ['prof-search','dept-filter','uni-filter','rating-min','wta-filter','sort-by','verified-only'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('change', applyFilters);
    if (el) el.addEventListener('input', applyFilters);
  });
  document.getElementById('rating-min').addEventListener('input', function() {
    document.getElementById('rating-min-val').textContent = parseFloat(this.value).toFixed(1);
  });
  document.getElementById('reset-filters').addEventListener('click', () => {
    document.getElementById('prof-search').value = '';
    document.getElementById('dept-filter').value = '';
    document.getElementById('uni-filter').value = '';
    document.getElementById('rating-min').value = 1;
    document.getElementById('rating-min-val').textContent = '1.0';
    document.getElementById('wta-filter').value = '0';
    document.getElementById('sort-by').value = 'rating';
    document.getElementById('verified-only').checked = false;
    applyFilters();
  });
  document.getElementById('clear-search').addEventListener('click', () => {
    document.getElementById('reset-filters').click();
  });
});
</script>
</body>
</html>
