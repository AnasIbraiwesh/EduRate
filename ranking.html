<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rankings — EduRate</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link id="bs-rtl" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" disabled>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .rank-wrap { position: relative; }
    .rank-num  { position:absolute;top:12px;right:12px;z-index:10;border-radius:999px;padding:2px 10px;font-weight:700;font-size:13px;background:var(--primary);color:#fff; }
    .rank-num.gold   { background:#F1C40F;color:#1B4F72; }
    .rank-num.silver { background:#95A5A6;color:#fff; }
    .rank-num.bronze { background:#BA6A2B;color:#fff; }
  </style>
</head>
<body>

<div id="navbar-placeholder"></div>

<header class="page-hero">
  <div class="container">
    <span class="hero-eyebrow" style="font-size:12px"><i class="bi bi-trophy me-1" aria-hidden="true"></i><span data-i18n="ranking.eyebrow">University Rankings</span></span>
    <h1 class="mt-2 mb-2" data-i18n="ranking.title">Top Ranked Universities</h1>
    <p class="mb-0" data-i18n="ranking.subtitle">Universities ranked by official standing — sorted from highest to lowest</p>
  </div>
</header>

<main class="container py-5">
  <div id="uni-grid" class="row g-4" aria-live="polite"></div>
</main>

<div id="footer-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/translations.js"></script>
<script src="js/i18n.js"></script>
<script src="js/api.js"></script>
<script src="js/data.js"></script>
<script src="js/main.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  buildNavbar('ranking');
  buildFooter();
  I18N.init();

  const medalClass = i => i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';

  try {
    const raw  = await API.getUniversities();
    const unis = raw.map(normalizeUniversity)
                    .sort((a, b) => b.ranking - a.ranking || b.overallRating - a.overallRating);

    document.getElementById('uni-grid').innerHTML = unis.map((u, i) =>
      uniCardHTML(u)
        .replace('col-lg-4 col-md-6"', 'col-lg-4 col-md-6 rank-wrap"')
        .replace('<div class="uni-card card-hover h-100">',
                 `<div class="uni-card card-hover h-100"><span class="rank-num ${medalClass(i)}">#${i + 1}</span>`)
    ).join('');
  } catch {
    document.getElementById('uni-grid').innerHTML =
      `<p class="text-muted text-center py-5">${t('ranking.error')}</p>`;
  }
});
</script>
</body>
</html>
