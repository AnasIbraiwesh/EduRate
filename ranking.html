<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rankings — EduRate</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link id="bs-rtl" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" disabled>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .leaderboard{list-style:none;padding:0;margin:0;}
    .lb-row{display:flex;align-items:center;gap:16px;padding:14px 20px;background:#fff;border-radius:10px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.08);transition:box-shadow .2s;}
    .lb-row:hover{box-shadow:0 4px 12px rgba(0,0,0,.12);}
    .lb-rank{font-size:22px;font-weight:700;min-width:48px;text-align:center;}
    .lb-rank.gold{color:#F1C40F;text-shadow:0 0 6px rgba(241,196,15,.4);}
    .lb-rank.silver{color:#95A5A6;}
    .lb-rank.bronze{color:#BA6A2B;}
    .lb-name{flex:1;font-weight:600;font-size:15px;}
    .lb-city{color:#6c757d;font-size:13px;min-width:90px;}
    .lb-score{font-size:13px;color:#6c757d;min-width:80px;}
    .lb-rating{font-size:14px;font-weight:600;color:#e67e22;min-width:60px;text-align:right;}
    @media(max-width:576px){.lb-city,.lb-score{display:none;}.lb-row{padding:12px 14px;}}
  </style>
</head>
<body>

<div id="navbar-placeholder"></div>

<header class="page-hero">
  <div class="container">
    <span class="hero-eyebrow" style="font-size:12px"><i class="bi bi-trophy me-1" aria-hidden="true"></i><span data-i18n="ranking.eyebrow">University Rankings</span></span>
    <h1 class="mt-2 mb-2" data-i18n="ranking.title">Top Ranked Universities</h1>
    <p class="mb-0" data-i18n="ranking.subtitle">Universities ranked by official standing — sorted from highest to lowest</p>
  </div>
</header>

<main class="container py-5">
  <ul id="uni-grid" class="leaderboard" aria-live="polite"></ul>
</main>

<div id="footer-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/translations.js"></script>
<script src="js/i18n.js"></script>
<script src="js/api.js"></script>
<script src="js/data.js"></script>
<script src="js/main.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  buildNavbar('ranking');
  buildFooter();
  I18N.init();

  const medalClass = i => i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
  const rankIcon   = i => i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `#${i + 1}`;

  try {
    const raw  = await API.getUniversities();
    const unis = raw.map(normalizeUniversity)
                    .sort((a, b) => a.ranking - b.ranking || b.overallRating - a.overallRating);

    document.getElementById('uni-grid').innerHTML = unis.map((u, i) => `
      <li class="lb-row">
        <span class="lb-rank ${medalClass(i)}">${rankIcon(i)}</span>
        <span class="lb-name">${u.name}</span>
        <span class="lb-city"><i class="bi bi-geo-alt-fill me-1"></i>${u.city || '—'}</span>
        <span class="lb-score">Rank ${u.ranking || '—'}</span>
        <span class="lb-rating">★ ${u.overallRating ? u.overallRating.toFixed(1) : '—'}</span>
      </li>`).join('');
  } catch {
    document.getElementById('uni-grid').innerHTML =
      `<li style="list-style:none" class="text-muted text-center py-5">${t('ranking.error')}</li>`;
  }
});
</script>
</body>
</html>
