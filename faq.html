<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FAQ — EduRate</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<a href="#main-content" class="skip-link">Skip to content</a>
<div id="navbar-placeholder"></div>

<main id="main-content">

  <!-- ── Page Header ──────────────────────────────────────── -->
  <div style="background:var(--primary);padding:48px 0 40px;text-align:center">
    <div class="container">
      <h1 class="display-title" style="color:var(--white);margin-bottom:8px">Frequently Asked Questions</h1>
      <p style="color:rgba(255,255,255,0.65);font-size:15px;margin-bottom:32px">Find answers to the most common questions about EduRate</p>

      <!-- Search -->
      <div style="max-width:500px;margin:0 auto;position:relative">
        <span style="position:absolute;left:18px;top:50%;transform:translateY(-50%);color:var(--gray-400);pointer-events:none">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </span>
        <input type="text" id="faqSearch" class="er-input"
               placeholder="Search questions..."
               style="height:52px;padding-left:48px;font-size:15px;border-radius:var(--radius-pill)"
               aria-label="Search frequently asked questions"
               autocomplete="off">
      </div>
    </div>
  </div>

  <!-- ── Category Pills ───────────────────────────────────── -->
  <div style="background:var(--white);border-bottom:1px solid var(--gray-200);padding:16px 0;position:sticky;top:64px;z-index:100">
    <div class="container">
      <div style="display:flex;gap:10px;overflow-x:auto;padding-bottom:2px;flex-wrap:wrap">
        <button class="cat-pill active" data-cat="all"       onclick="filterCat(this,'all')">All Questions</button>
        <button class="cat-pill"        data-cat="general"   onclick="filterCat(this,'general')">General</button>
        <button class="cat-pill"        data-cat="reviews"   onclick="filterCat(this,'reviews')">Reviews</button>
        <button class="cat-pill"        data-cat="comparing" onclick="filterCat(this,'comparing')">Comparing</button>
        <button class="cat-pill"        data-cat="account"   onclick="filterCat(this,'account')">Account</button>
        <button class="cat-pill"        data-cat="privacy"   onclick="filterCat(this,'privacy')">Privacy</button>
      </div>
    </div>
  </div>

  <!-- ── FAQ Content ──────────────────────────────────────── -->
  <section class="content-section">
    <div class="container" style="max-width:780px">

      <div id="faqList" aria-live="polite" aria-label="FAQ items"></div>

      <div id="faqEmpty" class="empty-state d-none">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <h4>No questions found</h4>
        <p>Try a different search term or category</p>
      </div>

      <!-- Still have questions? -->
      <div style="background:var(--accent-light);border-radius:var(--radius-md);padding:32px;text-align:center;margin-top:40px">
        <h3 style="font-family:var(--font-heading);font-weight:700;font-size:18px;color:var(--primary);margin-bottom:8px">Still have questions?</h3>
        <p style="font-size:14px;color:var(--gray-700);margin-bottom:20px">Can't find what you're looking for? Our support team is happy to help.</p>
        <a href="mailto:support@edurate.jo" class="btn-er-primary">Contact Support</a>
      </div>

    </div>
  </section>

</main>

<div id="footer-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/data.js"></script>
<script src="js/main.js"></script>
<script src="js/faq.js"></script>
</body>
</html>
