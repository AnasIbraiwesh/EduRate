<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FAQ — EduRate</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="navbar-placeholder"></div>

<header class="page-hero">
  <div class="container text-center">
    <h1><i class="bi bi-question-circle me-2" aria-hidden="true"></i>Frequently Asked Questions</h1>
    <p class="mb-0">Find answers to the most common questions about EduRate</p>
  </div>
</header>

<main class="container py-5" style="max-width:860px">
  <!-- Search -->
  <div class="faq-search-wrap" role="search">
    <input type="search" id="faq-search" placeholder="Search questions…" aria-label="Search frequently asked questions">
    <button class="search-btn" aria-label="Search">
      <i class="bi bi-search" aria-hidden="true"></i>
    </button>
  </div>

  <!-- No results -->
  <div id="faq-no-results" class="empty-state d-none">
    <div class="empty-state-icon" aria-hidden="true"><i class="bi bi-search"></i></div>
    <h3>No Questions Found</h3>
    <p>Try different search terms or browse all questions below.</p>
    <button class="btn btn-outline-primary" id="clear-faq-search">Clear Search</button>
  </div>

  <!-- FAQ Groups -->
  <div id="faq-container" aria-label="Frequently asked questions"></div>

  <!-- Contact Support -->
  <div class="text-center mt-5 py-4" style="border-top:1px solid var(--border)">
    <div style="font-size:40px;margin-bottom:12px" aria-hidden="true">💬</div>
    <h3 style="font-size:20px;margin-bottom:8px">Still have questions?</h3>
    <p style="color:var(--text-secondary);margin-bottom:20px">
      Our support team is here to help. We typically respond within 24 hours.
    </p>
    <a href="mailto:support@edurate.jo" class="btn btn-primary btn-lg">
      <i class="bi bi-envelope me-2" aria-hidden="true"></i>Contact Support
    </a>
  </div>
</main>

<div id="footer-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/data.js"></script>
<script src="js/main.js"></script>
<script>
const CATEGORY_ICONS = {
  General:    'bi-info-circle',
  Ratings:    'bi-star-half',
  Reviews:    'bi-chat-quote',
  Comparison: 'bi-layout-split',
  Account:    'bi-person-circle'
};

function renderFAQ(filter = '') {
  const container  = document.getElementById('faq-container');
  const noResults  = document.getElementById('faq-no-results');
  const q = filter.trim().toLowerCase();
  let totalVisible = 0;

  const html = FAQ_DATA.map((group, gi) => {
    const items = group.items.filter(item =>
      !q || item.q.toLowerCase().includes(q) || item.a.toLowerCase().includes(q)
    );
    if (!items.length) return '';
    totalVisible += items.length;

    const accordionId = `faq-group-${gi}`;
    const icon = CATEGORY_ICONS[group.category] || 'bi-chevron-right';
    const itemsHTML = items.map((item, ii) => {
      const itemId = `${accordionId}-item${ii}`;
      const collapseId = `collapse-${gi}-${ii}`;
      // Highlight matching text
      const qText = q ? item.q.replace(new RegExp(`(${q})`, 'gi'), '<mark>$1</mark>') : item.q;
      const aText = q ? item.a.replace(new RegExp(`(${q})`, 'gi'), '<mark>$1</mark>') : item.a;
      return `
        <div class="accordion-item" id="${itemId}">
          <h3 class="accordion-header">
            <button class="accordion-button collapsed" type="button"
              data-bs-toggle="collapse" data-bs-target="#${collapseId}"
              aria-expanded="false" aria-controls="${collapseId}">
              ${qText}
            </button>
          </h3>
          <div id="${collapseId}" class="accordion-collapse collapse" data-bs-parent="">
            <div class="accordion-body">${aText}</div>
          </div>
        </div>`;
    }).join('');

    return `
      <div class="faq-group" role="region" aria-labelledby="faq-cat-${gi}">
        <div class="faq-group-title" id="faq-cat-${gi}">
          <i class="bi ${icon} me-2" aria-hidden="true"></i>${group.category}
        </div>
        <div class="accordion" id="${accordionId}">${itemsHTML}</div>
      </div>`;
  }).join('');

  container.innerHTML = html || '';
  noResults.classList.toggle('d-none', totalVisible > 0 || !q);
  container.style.display = totalVisible > 0 ? '' : 'none';
}

document.addEventListener('DOMContentLoaded', () => {
  buildNavbar('');
  buildFooter();
  renderFAQ();

  document.getElementById('faq-search').addEventListener('input', function() {
    renderFAQ(this.value);
  });
  document.getElementById('clear-faq-search').addEventListener('click', () => {
    document.getElementById('faq-search').value = '';
    renderFAQ();
  });
});
</script>
</body>
</html>
