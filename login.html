<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — EduRate</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: var(--bg); }
    .auth-page {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 40px 16px;
    }
    .auth-page-inner { width: 100%; max-width: 460px; }
  </style>
</head>
<body>

<div id="navbar-placeholder"></div>

<main class="auth-page" id="main-content">
  <div class="auth-page-inner">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">Edu<span>Rate</span></div>
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-subtitle">Log in to write reviews and get recommendations</p>
      </div>

      <!-- Demo logins -->
      <div class="alert alert-info d-flex gap-2 align-items-start py-2 px-3 mb-4" style="font-size:13px;border-radius:var(--radius-md)">
        <i class="bi bi-info-circle-fill mt-1 flex-shrink-0"></i>
        <div>
          <strong>Demo:</strong> student@ju.edu.jo / password123 (Student)<br>
          &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;prof@psut.edu.jo / password123 (Professor)
        </div>
      </div>

      <form id="login-form" novalidate aria-label="Login form">
        <!-- Email -->
        <div class="mb-3">
          <label for="email" class="form-label">Email Address</label>
          <div class="input-group">
            <span class="input-group-text bg-transparent" style="border-right:0"><i class="bi bi-envelope text-muted" aria-hidden="true"></i></span>
            <input type="email" id="email" name="email"
              class="form-control" style="border-left:0"
              placeholder="your@university.edu"
              autocomplete="email" required>
          </div>
          <div class="invalid-feedback" id="email-error" role="alert"></div>
        </div>

        <!-- Password -->
        <div class="mb-3">
          <div class="d-flex justify-content-between align-items-center">
            <label for="password" class="form-label mb-0">Password</label>
            <a href="#" class="form-text text-secondary" style="font-size:13px">Forgot Password?</a>
          </div>
          <div class="password-wrap mt-1">
            <input type="password" id="password" name="password"
              class="form-control" placeholder="Enter your password"
              autocomplete="current-password" required>
            <button type="button" class="password-toggle" id="toggle-pw" aria-label="Show/hide password">
              <i class="bi bi-eye" aria-hidden="true"></i>
            </button>
          </div>
          <div class="invalid-feedback" id="pw-error" role="alert"></div>
        </div>

        <!-- Remember me -->
        <div class="mb-4 form-check">
          <input class="form-check-input" type="checkbox" id="remember">
          <label class="form-check-label" for="remember" style="font-size:14px">Remember me for 30 days</label>
        </div>

        <button type="submit" class="btn btn-primary w-100 btn-lg" id="login-btn">
          <span id="login-text">Log In</span>
          <span id="login-spinner" class="spinner-border spinner-border-sm ms-2 d-none" role="status" aria-label="Loading"></span>
        </button>
      </form>

      <div class="divider-text">or</div>

      <p class="text-center" style="font-size:15px">
        Don't have an account?
        <a href="signup.html" class="fw-600">Sign Up</a>
      </p>
    </div>
  </div>
</main>

<div id="footer-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/data.js"></script>
<script src="js/main.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  buildNavbar('');
  buildFooter();

  // Redirect if already logged in
  if (AUTH.isLoggedIn()) window.location.href = 'index.html';

  // Password toggle
  document.getElementById('toggle-pw').addEventListener('click', function() {
    const pw = document.getElementById('password');
    const icon = this.querySelector('i');
    if (pw.type === 'password') { pw.type = 'text'; icon.className = 'bi bi-eye-slash'; }
    else { pw.type = 'password'; icon.className = 'bi bi-eye'; }
  });

  // Form submit
  document.getElementById('login-form').addEventListener('submit', e => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    let valid = true;

    // Validate
    document.querySelectorAll('.invalid-feedback').forEach(el => el.textContent = '');
    document.querySelectorAll('.is-invalid').forEach(el => el.classList.remove('is-invalid'));

    if (!email) {
      document.getElementById('email').classList.add('is-invalid');
      document.getElementById('email-error').textContent = 'Email is required.';
      valid = false;
    } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      document.getElementById('email').classList.add('is-invalid');
      document.getElementById('email-error').textContent = 'Please enter a valid email address.';
      valid = false;
    }
    if (!password) {
      document.getElementById('password').classList.add('is-invalid');
      document.getElementById('pw-error').textContent = 'Password is required.';
      valid = false;
    }
    if (!valid) return;

    // Simulate login
    document.getElementById('login-btn').disabled = true;
    document.getElementById('login-spinner').classList.remove('d-none');
    document.getElementById('login-text').textContent = 'Logging in…';

    setTimeout(() => {
      // Demo credentials
      if (email === 'student@ju.edu.jo' && password === 'password123') {
        AUTH.set({ name: 'Ahmed Al-Rashid', email, role: 'student', university: 1 });
        showToast('Welcome back, Ahmed!', 'success');
        setTimeout(() => window.location.href = 'index.html', 1000);
      } else if (email === 'prof@psut.edu.jo' && password === 'password123') {
        AUTH.set({ name: 'Dr. Rania Nasser', email, role: 'professor', professorId: 4 });
        showToast('Welcome back, Dr. Nasser!', 'success');
        setTimeout(() => window.location.href = 'dashboard.html', 1000);
      } else {
        document.getElementById('login-btn').disabled = false;
        document.getElementById('login-spinner').classList.add('d-none');
        document.getElementById('login-text').textContent = 'Log In';
        showToast('Invalid email or password. Try the demo credentials.', 'error');
      }
    }, 1200);
  });
});
</script>
</body>
</html>
