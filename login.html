<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="favicon.png">
  <title>Log In — EduRate</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link id="bs-rtl" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" disabled>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: var(--bg); }
    .auth-page {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 40px 16px;
    }
    .auth-page-inner { width: 100%; max-width: 460px; }
  </style>
</head>
<body>

<div id="navbar-placeholder"></div>

<main class="auth-page" id="main-content">
  <div class="auth-page-inner">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo"><span dir="ltr" style="unicode-bidi:isolate">Edu<span>Rate</span></span></div>
        <h1 class="auth-title" data-i18n="login.title">Welcome Back</h1>
        <p class="auth-subtitle" data-i18n="login.subtitle">Log in to write reviews and get recommendations</p>
      </div>

      <form id="login-form" novalidate aria-label="Login form">
        <!-- Email -->
        <div class="mb-3">
          <label for="email" class="form-label" data-i18n="login.email_label">Email Address</label>
          <div class="input-group">
            <span class="input-group-text bg-transparent" style="border-right:0"><i class="bi bi-envelope text-muted" aria-hidden="true"></i></span>
            <input type="email" id="email" name="email"
              class="form-control" style="border-left:0"
              data-i18n-placeholder="login.email_ph"
              placeholder="your@university.edu"
              autocomplete="email" required>
          </div>
          <div class="invalid-feedback" id="email-error" role="alert"></div>
        </div>

        <!-- Password -->
        <div class="mb-4">
          <label for="password" class="form-label" data-i18n="login.pw_label">Password</label>
          <div class="password-wrap mt-1">
            <input type="password" id="password" name="password"
              class="form-control"
              data-i18n-placeholder="login.pw_ph"
              placeholder="Enter your password"
              autocomplete="current-password" required>
            <button type="button" class="password-toggle" id="toggle-pw" aria-label="Show/hide password">
              <i class="bi bi-eye" aria-hidden="true"></i>
            </button>
          </div>
          <div class="invalid-feedback" id="pw-error" role="alert"></div>
        </div>

        <button type="submit" class="btn btn-primary w-100 btn-lg" id="login-btn">
          <span id="login-text" data-i18n="login.btn">Log In</span>
          <span id="login-spinner" class="spinner-border spinner-border-sm ms-2 d-none" role="status" aria-label="Loading"></span>
        </button>
      </form>

      <div class="divider-text" data-i18n="login.or">or</div>

      <p class="text-center" style="font-size:15px">
        <span data-i18n="login.no_account">Don't have an account?</span>
        <a href="signup.html" class="fw-600" data-i18n="login.signup_link">Sign Up</a>
      </p>
    </div>
  </div>
</main>

<div id="footer-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/translations.js"></script>
<script src="js/i18n.js"></script>
<script src="js/api.js"></script>
<script src="js/data.js"></script>
<script src="js/main.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  buildNavbar('');
  buildFooter();
  I18N.init();

  if (AUTH.isLoggedIn()) window.location.href = 'index.html';

  const _origSetLang = I18N.setLanguage.bind(I18N);
  I18N.setLanguage = function(lang) {
    _origSetLang(lang);
    document.querySelectorAll('#login-form .invalid-feedback').forEach(el => { el.textContent = ''; });
    document.querySelectorAll('#login-form .is-invalid').forEach(el => el.classList.remove('is-invalid'));
  };

  document.getElementById('toggle-pw').addEventListener('click', function() {
    const pw = document.getElementById('password');
    const icon = this.querySelector('i');
    if (pw.type === 'password') { pw.type = 'text'; icon.className = 'bi bi-eye-slash'; }
    else { pw.type = 'password'; icon.className = 'bi bi-eye'; }
  });

  document.getElementById('login-form').addEventListener('submit', e => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    let valid = true;

    document.querySelectorAll('.invalid-feedback').forEach(el => el.textContent = '');
    document.querySelectorAll('.is-invalid').forEach(el => el.classList.remove('is-invalid'));

    if (!email) {
      document.getElementById('email').classList.add('is-invalid');
      document.getElementById('email-error').textContent = t('login.err_email_required');
      valid = false;
    } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      document.getElementById('email').classList.add('is-invalid');
      document.getElementById('email-error').textContent = t('login.err_email_invalid');
      valid = false;
    }
    if (!password) {
      document.getElementById('password').classList.add('is-invalid');
      document.getElementById('pw-error').textContent = t('login.err_pw_required');
      valid = false;
    }
    if (!valid) return;

    const btn = document.getElementById('login-btn');
    const loginText = document.getElementById('login-text');
    btn.disabled = true;
    document.getElementById('login-spinner').classList.remove('d-none');
    loginText.removeAttribute('data-i18n');
    loginText.textContent = '…';

    API.login(email, password)
      .then(user => {
        AUTH.set(user);
        window.location.href = 'index.html';
      })
      .catch(err => {
        btn.disabled = false;
        document.getElementById('login-spinner').classList.add('d-none');
        loginText.setAttribute('data-i18n', 'login.btn');
        loginText.textContent = t('login.btn');
        showToast(err.status === 401 ? t('login.err_invalid') : t('login.err_failed'), 'error');
      });
  });
});
</script>
</body>
</html>
