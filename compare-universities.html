<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compare Universities — EduRate</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<a href="#main-content" class="skip-link">Skip to content</a>
<div id="navbar-placeholder"></div>

<main id="main-content">

  <!-- ── Page Header ──────────────────────────────────────── -->
  <div style="background:var(--primary);padding:36px 0 28px">
    <div class="container">
      <div class="er-breadcrumb">
        <a href="index.html">Home</a>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        Compare Universities
      </div>
      <h1 class="heading-1" style="color:var(--white);margin-bottom:6px">Compare Universities</h1>
      <p style="color:rgba(255,255,255,0.65);font-size:14px;margin:0">Side-by-side comparison across all 10 rating categories</p>
    </div>
  </div>

  <!-- ── Selector Row ─────────────────────────────────────── -->
  <div style="background:var(--white);border-bottom:1px solid var(--gray-200);padding:20px 0">
    <div class="container">
      <div class="row align-items-center g-3">
        <div class="col-12 col-md-5">
          <label class="er-label">University A</label>
          <select id="selectA" class="er-select" aria-label="Select University A"></select>
        </div>
        <div class="col-12 col-md-2 text-center">
          <span style="font-family:var(--font-heading);font-weight:700;font-size:18px;color:var(--gray-400)">VS</span>
        </div>
        <div class="col-12 col-md-5">
          <label class="er-label">University B</label>
          <select id="selectB" class="er-select" aria-label="Select University B"></select>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Comparison Content ───────────────────────────────── -->
  <section class="content-section">
    <div class="container">

      <!-- Placeholder -->
      <div id="placeholder" class="empty-state" style="padding:80px 20px">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg>
        <h4>Select two universities to compare</h4>
        <p>Choose both universities from the dropdowns above</p>
      </div>

      <!-- Comparison table -->
      <div id="comparisonContent" class="d-none">

        <!-- Entity headers -->
        <div class="row g-4 mb-4">
          <div class="col-md-5 offset-md-1">
            <div class="compare-entity-header" id="headerA"></div>
          </div>
          <div class="col-md-5">
            <div class="compare-entity-header" id="headerB"></div>
          </div>
        </div>

        <!-- Category rows -->
        <div class="review-card mb-4">
          <h2 class="heading-2 mb-4">Category-by-Category</h2>
          <div id="comparisonRows"></div>
        </div>

        <!-- Winner summary -->
        <div class="row g-4 mb-4">
          <div class="col-md-6">
            <div id="winnerA" style="text-align:center;padding:20px;background:var(--gray-100);border-radius:var(--radius-md)"></div>
          </div>
          <div class="col-md-6">
            <div id="winnerB" style="text-align:center;padding:20px;background:var(--gray-100);border-radius:var(--radius-md)"></div>
          </div>
        </div>

        <!-- Radar Chart -->
        <div class="review-card mb-4">
          <h2 class="heading-2 mb-3">Overall Radar Comparison</h2>
          <div style="position:relative;height:380px;max-width:500px;margin:0 auto">
            <canvas id="radarChart" aria-label="Radar comparison chart"></canvas>
          </div>
          <div id="radarLegend" style="display:flex;justify-content:center;gap:24px;margin-top:16px"></div>
        </div>

        <!-- Share button -->
        <div style="text-align:center">
          <button class="btn-er-secondary" onclick="shareComparison()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
            Share Comparison
          </button>
        </div>

      </div>
    </div>
  </section>

</main>

<div id="footer-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/data.js"></script>
<script src="js/main.js"></script>
<script src="js/compare.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => initComparePage('university'));
</script>
</body>
</html>
